name: Weekly review insight update

on:
  schedule:
    # 09:30 KST every Monday.
    - cron: "30 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-review-insights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate review insights
        run: npm run generate:review-insights

      - name: Commit updated review data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/review-insights.js
          if git diff --cached --quiet; then
            echo "No review insight changes to commit."
          else
            git commit -m "Update review insight data"
            git push
          fi
