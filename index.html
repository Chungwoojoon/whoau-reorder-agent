<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>후아유 리오더 에이전트</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="hero">
        <div>
          <p class="eyebrow">WHO.A.U DASHBOARD</p>
          <h1>후아유 자동 <span>리오더</span> 시스템</h1>
          <p class="hero-copy">2026 신상품 판매 흐름, 전년 유사 스타일, 정상판매율, 컬러·사이즈 소진을 함께 반영합니다.</p>
        </div>
        <div class="hero-actions">
          <span id="generatedAt">실시간 샘플 데이터</span>
          <button id="resetFilters" type="button">필터 초기화</button>
        </div>
      </header>

      <section class="kpi-grid" aria-label="리오더 주요 지표">
        <article class="kpi-card">
          <p>리오더 스타일 수</p>
          <strong id="kpiStyles">-</strong>
        </article>
        <article class="kpi-card">
          <p>W+0 발주량</p>
          <strong id="kpiW0">-</strong>
        </article>
        <article class="kpi-card">
          <p>5주 발주량</p>
          <strong id="kpiFiveWeeks">-</strong>
        </article>
        <article class="kpi-card">
          <p>리오더 환기율</p>
          <strong class="accent" id="kpiRate">-</strong>
        </article>
        <article class="kpi-card portfolio">
          <p>생산지 포트폴리오</p>
          <div class="progress"><span id="portfolioBar"></span></div>
          <small id="portfolioText">추천 스타일 기준</small>
        </article>
      </section>

      <section class="workbench">
        <div class="tabs">
          <button class="active" type="button">상세 내역</button>
          <button type="button">주차별 상세 수량</button>
          <button type="button">리오더 확정 <span id="confirmCount">0</span></button>
          <button type="button">조정 요청 <span>0</span></button>
        </div>

        <div class="toolbar">
          <div class="filters">
            <select id="seasonFilter" aria-label="시즌 필터"></select>
            <select id="categoryFilter" aria-label="복종 필터"></select>
            <select id="weekFilter" aria-label="주차 필터"></select>
          </div>
          <div class="right-tools">
            <span id="rowCount">-</span>
            <button type="button" id="addStyle">+ 스타일 추가</button>
            <button type="button" id="downloadCsv">엑셀 다운로드</button>
            <input id="searchInput" type="search" placeholder="아이템 또는 스타일코드 검색" />
          </div>
        </div>

        <section class="week-board" id="weekBoard" aria-label="주차별 리오더 요약"></section>

        <section class="detail-panel">
          <div class="detail-head">
            <h2>Agent 상세 내역</h2>
            <p>기준정보 / 성과 / 리오더</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>연도</th>
                  <th>시즌</th>
                  <th>복종</th>
                  <th>사진</th>
                  <th>스타일코드</th>
                  <th>스타일명</th>
                  <th class="num">입고</th>
                  <th class="num">판매량</th>
                  <th class="num">정상판매율</th>
                  <th class="num">주판량</th>
                  <th class="num">환기율</th>
                  <th>전년 유사</th>
                  <th class="num">현재 재고</th>
                  <th class="num">W+0</th>
                  <th class="num">5주 합계</th>
                  <th class="num">예상판매</th>
                  <th>리오더</th>
                </tr>
              </thead>
              <tbody id="detailBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="styleModal" hidden>
      <section class="style-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-head">
          <h2 id="modalTitle">Style detail</h2>
          <button class="modal-close" id="modalClose" type="button" aria-label="Close">×</button>
        </header>
        <div class="modal-body" id="modalBody"></div>
      </section>
    </div>

    <script src="./data/app-data.js"></script>
    <script src="./data/image-map.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
