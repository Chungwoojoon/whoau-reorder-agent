<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매장별 SKU 재고 결품판</title>
    <link rel="stylesheet" href="./inventory.css" />
  </head>
  <body>
    <main class="inventory-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">STORE SKU INVENTORY</p>
          <h1>매장별 스타일 재고 결품판</h1>
          <p class="subtitle">스타일, 컬러, 사이즈 단위로 매장 재고와 결품 강도를 한 화면에서 봅니다.</p>
        </div>
        <div class="status-panel">
          <span>데이터 기준</span>
          <strong id="dataWeek">-</strong>
          <small id="generatedAt">-</small>
        </div>
      </header>

      <section class="kpi-grid" aria-label="요약 지표">
        <article>
          <span>관리 SKU</span>
          <strong id="skuCount">-</strong>
        </article>
        <article>
          <span>결품 매장</span>
          <strong id="shortStoreCount">-</strong>
        </article>
        <article>
          <span>결품 SKU</span>
          <strong id="shortSkuCount">-</strong>
        </article>
        <article>
          <span>필요 보충량</span>
          <strong id="needQty">-</strong>
        </article>
      </section>

      <section class="control-band" aria-label="필터">
        <label class="search-box">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="스타일명, 코드, 매장명" />
        </label>
        <label class="select-box">
          <span>매장</span>
          <select id="storeSelect"></select>
        </label>
        <label class="select-box">
          <span>강도</span>
          <select id="severitySelect">
            <option value="all">전체</option>
            <option value="critical">심각</option>
            <option value="warning">주의</option>
            <option value="healthy">정상</option>
          </select>
        </label>
        <label class="toggle-row">
          <input id="shortOnlyInput" type="checkbox" checked />
          <span>결품만 보기</span>
        </label>
      </section>

      <section class="workbench">
        <aside class="store-panel" aria-labelledby="storePanelTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">STORES</p>
              <h2 id="storePanelTitle">결품 심한 매장</h2>
            </div>
          </div>
          <div id="storeList" class="store-list"></div>
        </aside>

        <section class="matrix-panel" aria-labelledby="matrixTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">SKU MATRIX</p>
              <h2 id="matrixTitle">매장별 스타일 재고</h2>
            </div>
            <p id="resultMeta">-</p>
          </div>
          <div class="matrix-scroll">
            <table class="sku-table">
              <thead>
                <tr>
                  <th>매장</th>
                  <th>스타일</th>
                  <th>컬러</th>
                  <th>사이즈</th>
                  <th>현재</th>
                  <th>기준</th>
                  <th>필요</th>
                  <th>강도</th>
                </tr>
              </thead>
              <tbody id="skuTableBody"></tbody>
            </table>
          </div>
        </section>

        <aside class="detail-panel" aria-labelledby="detailTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">STORE DETAIL</p>
              <h2 id="detailTitle">매장 결품 상품</h2>
            </div>
          </div>
          <div id="storeDetail" class="detail-body"></div>
        </aside>
      </section>
    </main>

    <script src="./data/app-data.js"></script>
    <script src="./inventory.js"></script>
  </body>
</html>
